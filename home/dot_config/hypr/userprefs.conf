# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


env = QT_AUTO_SCREEN_SCALE_FACTOR, 1.25
env = GDK_SCALE, 1.25

decoration {
  blur {
    enabled = true
  }
  shadow {
    enabled = false
  }
}

input {
    touchpad {
      natural_scroll = yes
      scroll_factor = 0.1
    }
    force_no_accel = 1
    scroll_factor = 0.6
    follow_mouse = 1
    repeat_delay = 300
}

cursor {
  # hide_on_key_press	= yes
  inactive_timeout = 10
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
  no_donation_nag = true
}

misc {
  vfr = true
  key_press_enables_dpms = true
  mouse_move_enables_dpms = false
}

permission = fcitx5-lotus-server, keyboard, allow

# exec-once = gammastep-indicator
exec-once = eval "$(ssh-agent -s)"
exec-once = fcitx5

# Use hyprctl clients to list apps info
exec-once=[workspace 1 silent] $BROWSER
exec-once=[workspace special silent; fullscreen] $TERMINAL -e zsh -l -c "tmux new-session -A"

# UTILS
