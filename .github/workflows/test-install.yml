name: Test Install

on:
  push:
    branches:
      - main

env:
  BIN_PATH: ${{ github.workspace }}/bin
  INIT_ARGS: >
    --apply
    --depth=1
    --exclude='encrypted,externals,scripts'
    --promptDefaults
    --no-tty
    --color=false
  DOCTOR_ARGS: >
    --keep-going 
    --no-tty
    --color=false

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        os:
          - windows
          - ubuntu
          - macos
    runs-on: ${{ matrix.os }}-latest
    name: ${{ matrix.os }}
    steps:
      - name: Install chezmoi
        shell: bash
        run: bash <(curl -fsLS get.chezmoi.io) -b ${{ env.BIN_PATH }}
      - name: Init chezmoi
        shell: bash
        run: ${{ env.BIN_PATH }}/chezmoi init ${{ github.repository_owner }} ${{ env.INIT_ARGS }}
      - name: Chezmoi doctor
        shell: bash
        run: ${{ env.BIN_PATH }}/chezmoi doctor ${{ env.DOCTOR_ARGS }}
      - name: Check all template
        shell: bash
        run: |
          for tmpl in $(find . -name '*.tmpl'); do
            chezmoi execute-template < "$tmpl" > /dev/null
            if [ $? -ne 0 ]; then
              echo "$tmpl: Syntax Error"
            fi
          done
